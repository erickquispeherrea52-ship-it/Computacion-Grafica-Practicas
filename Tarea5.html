<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 2: Rotación Tridimensional Grande</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #19d5db 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* CONTENEDOR MÁS GRANDE */
        #contenedor-principal {
            position: relative;
            width: 1000px; /* Aumentado */
            height: 700px; /* Aumentado */
            border: 3px solid #00f7ff;
            box-shadow: 0 0 35px rgba(0, 247, 255, 0.4);
            border-radius: 15px;
            overflow: hidden;
        }

        #panel-controles {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00f7ff;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: #00f7ff;
            z-index: 10;
        }

        .boton-control {
            background: transparent;
            border: 1px solid #00f7ff;
            color: #00f7ff;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .boton-control:hover {
            background: #00f7ff;
            color: #1a1a2e;
        }

        .boton-control.activo {
            background: rgba(0, 247, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="contenedor-principal">
        <div id="panel-controles">
            <span style="font-weight: bold; margin-bottom: 5px; text-align: center;">Modos de Rotación</span>
            <button class="boton-control activo" id="btn-x">Solo Eje X</button>
            <button class="boton-control" id="btn-y">Solo Eje Y</button>
            <button class="boton-control" id="btn-ambos">Ambos Ejes</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const contenedor = document.getElementById('contenedor-principal');
        const ancho = 1000;
        const alto = 700;
        
        // 1. ESCENA Y CÁMARA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); 

        // Relación de aspecto actualizada para 1000/700
        const camera = new THREE.PerspectiveCamera(75, ancho / alto, 0.1, 1000);
        camera.position.z = 4; // Mantenemos la cercanía para que el cubo se vea grande

        // 2. RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(ancho, alto);
        contenedor.appendChild(renderer.domElement);

        // 3. CUBO (Aumentamos un poco el tamaño del cubo para que llene la nueva escena)
        const geometry = new THREE.BoxGeometry(1.8, 1.8, 1.8);
        const material = new THREE.MeshNormalMaterial(); 
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        // 4. VARIABLES DE CONTROL
        let rotarX = true;
        let rotarY = false;

        // 5. ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);

            if (rotarX) cubo.rotation.x += 0.02;
            if (rotarY) cubo.rotation.y += 0.02;

            renderer.render(scene, camera);
        }

        // 6. EVENTOS DE BOTONES
        const btnX = document.getElementById('btn-x');
        const btnY = document.getElementById('btn-y');
        const btnAmbos = document.getElementById('btn-ambos');

        function limpiarClases() {
            btnX.classList.remove('activo');
            btnY.classList.remove('activo');
            btnAmbos.classList.remove('activo');
        }

        btnX.onclick = function() {
            limpiarClases();
            btnX.classList.add('activo');
            rotarX = true;
            rotarY = false;
        };

        btnY.onclick = function() {
            limpiarClases();
            btnY.classList.add('activo');
            rotarX = false;
            rotarY = true;
        };

        btnAmbos.onclick = function() {
            limpiarClases();
            btnAmbos.classList.add('activo');
            rotarX = true;
            rotarY = true;
        };

        animate();
    </script>
</body>
</html>
