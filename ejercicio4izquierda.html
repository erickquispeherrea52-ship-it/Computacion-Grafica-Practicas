<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfica de función</title>
<style>
    canvas {
        border: 1px solid black;
    }
</style>
</head>

<body> 
<h2>Realizado por: Erick Jeandet Quispe Herrera</h2>
<h3>Ejercicio 4 - Función hacia la izquierda</h3>

<canvas id="myCanvas" width="500" height="500"></canvas>

<script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    // Dibujar los ejes
    ctx.beginPath();
    ctx.moveTo(0, 250);   // Eje X
    ctx.lineTo(500, 250);
    ctx.moveTo(250, 0);   // Eje Y
    ctx.lineTo(250, 500);
    ctx.stroke();

    ctx.beginPath();

    for (let y = -250; y <= 250; y++) {
        let x = Math.pow(y, 2) / 200;

        let canvasX = 250 + x;
        let canvasY = 250 - y;

        if (y === -250) {
            ctx.moveTo(canvasX, canvasY);
        } else {
            ctx.lineTo(canvasX, canvasY);
        }
    }

    ctx.strokeStyle = "blue";
    ctx.stroke();
</script>

</body>
</html>
