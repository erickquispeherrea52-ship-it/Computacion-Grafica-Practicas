<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 3: Transformaciones</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #19d5db 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #contenedor-principal {
            position: relative;
            width: 1000px;
            height: 700px;
            border: 3px solid #00f7ff; 
            box-shadow: 0 0 25px rgba(0, 247, 255, 0.4);
            border-radius: 15px;
            overflow: hidden;
        }

        #info { 
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 10, 20, 0.85);
            color: #00f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00f7ff;
            font-size: 13px;
            z-index: 10;
        }

        .tecla {
            color: #fff;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            border-bottom: 2px solid #000;
            font-weight: bold;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="info">
        <strong>CONTROLES INTERACTIVOS</strong><br>
        <span class="tecla">↑</span> <span class="tecla">↓</span> <span class="tecla">←</span> <span class="tecla">→</span> : Traslación<br>
        <span class="tecla">Q</span> / <span class="tecla">E</span> : Rotación<br>
        <span class="tecla">Z</span> / <span class="tecla">X</span> : Escalado
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const contenedor = document.getElementById('contenedor-principal');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); 

    // Ajustado exactamente a 1000 / 700 para que el cubo no se estire
    const camera = new THREE.PerspectiveCamera(75, 1000 / 700, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    // Ajustado a 700 de alto para que coincida con el CSS
    renderer.setSize(1000, 700);
    contenedor.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshNormalMaterial(); 
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);

    window.addEventListener('keydown', (event) => {
        const step = 0.2;      
        const rotateStep = 0.1; 
        const scaleStep = 0.1;  

        switch(event.key.toUpperCase()) {
            case 'ARROWUP':    cubo.position.y += step; break;
            case 'ARROWDOWN':  cubo.position.y -= step; break;
            case 'ARROWLEFT':  cubo.position.x -= step; break;
            case 'ARROWRIGHT': cubo.position.x += step; break;
            case 'Q': cubo.rotation.y -= rotateStep; break;
            case 'E': cubo.rotation.y += rotateStep; break;
            case 'Z': 
                cubo.scale.x += scaleStep;
                cubo.scale.y += scaleStep;
                cubo.scale.z += scaleStep;
                break;
            case 'X': 
                cubo.scale.x = Math.max(0.2, cubo.scale.x - scaleStep);
                cubo.scale.y = Math.max(0.2, cubo.scale.y - scaleStep);
                cubo.scale.z = Math.max(0.2, cubo.scale.z - scaleStep);
                break;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>
