<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traslación Eje X - Estilo Pro</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #19d5db 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #d83fd0;
            box-shadow: 0 0 30px rgba(216, 63, 208, 0.4);
            border-radius: 15px;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // 1. CREAR LA ESCENA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); 
    // 2. CREAR LA CAMARA
    const camera = new THREE.PerspectiveCamera(75, 800 / 500, 0.1, 1000);

    // 3. CREAR EL RENDERIZADOR (Ajustado a un tamaño fijo para el marco)
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(900, 600); 
    document.body.appendChild(renderer.domElement);

    // 4. CREAR EL CUBO (Lo hacemos un poco más grande: 1.5)
    const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const material = new THREE.MeshNormalMaterial(); // El estilo de tu profesor
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);

    // 5. POSICIONAR LA CAMARA
    camera.position.z = 5;

    // 6. VARIABLES
    let direccion = 0.03;

    // 7. ANIMACIÓN
    function animate() {
        requestAnimationFrame(animate);

        // MOVER EL CUBO
        cubo.position.x += direccion;

        // LÍMITE DERECHO
        if (cubo.position.x > 3) {
            direccion = -0.03; 
        }

        // LÍMITE IZQUIERDO
        if (cubo.position.x < -3) {
            direccion = 0.03; 
        }

        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>
