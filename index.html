<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(90deg, #000, #1a0033, #000);
  color: white;
}

/* PERFIL */
.perfil {
  display: flex;
  max-width: 900px;
  margin: 50px auto 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(10px);
}

/* AVATAR CON EFECTO */
.avatar {
  position: relative;
  width: 220px;
  height: 220px;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  position: relative;
  z-index: 2;
}

/* ARO GIRATORIO */
.avatar::before {
  content: "";
  position: absolute;
  top: -5px;
  left: -5px;
  width: 230px;
  height: 230px;
  border-radius: 50%;
  background: linear-gradient(45deg, cyan, blue, purple, cyan);
  animation: girar 4s linear infinite;
  z-index: 1;
}

/* GLOW */
.avatar::after {
  content: "";
  position: absolute;
  top: -10px;
  left: -10px;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: linear-gradient(45deg, cyan, blue, purple, cyan);
  filter: blur(20px);
  opacity: 0.7;
  z-index: 0;
}

/* ANIMACIÓN */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.info {
  margin-left: 20px;
}

.nombre {
  font-size: 28px;
  font-weight: bold;
}

.nivel {
  color: #00c6ff;
}

.lateral {
  margin-left: auto;
  text-align: right;
}

/* CARPETAS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  max-width: 900px;
  margin: 20px auto 50px;
  padding: 20px;
}

.folder {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

.folder:hover {
  transform: scale(1.1);
  background: #00c6ff;
  color: black;
  box-shadow: 0 0 20px cyan;
}

.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- PERFIL -->

  <div class="avatar">

    <img src="perfil.jpeg">
  </div>

  </div>

</div>
