<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Prácticas</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 40px;
    font-size: 2.5em;
  }

  ul {
    list-style: none;
    padding: 0;
    margin-top: 40px;
  }

  li {
    margin: 15px 0;
  }

  a {
    display: inline-block;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.1);
    padding: 15px 25px;
    border-radius: 10px;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
  }

  a:hover {
    background: #00c6ff;
    color: black;
    transform: scale(1.1);
  }

  /* Animación al cargar */
  li {
    opacity: 0;
    transform: translateY(20px);
    animation: aparecer 0.6s forwards;
  }

  li:nth-child(1) { animation-delay: 0.2s; }
  li:nth-child(2) { animation-delay: 0.4s; }
  li:nth-child(3) { animation-delay: 0.6s; }
  li:nth-child(4) { animation-delay: 0.8s; }
  li:nth-child(5) { animation-delay: 1s; }
  li:nth-child(6) { animation-delay: 1.2s; }
  li:nth-child(7) { animation-delay: 1.4s; }
  li:nth-child(8) { animation-delay: 1.6s; }

  @keyframes aparecer {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

</style>
</head>
