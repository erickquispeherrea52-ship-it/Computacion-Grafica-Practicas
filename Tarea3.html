<!DOCTYPE html>
<html lang="es">
<body>

<h2>Curva Dinámica Coseno</h2>
<canvas id="canvasCos" width="800" height="500" style="border:1px solid black;"></canvas>

<script>
var canvas = document.getElementById("canvasCos");
var ctx = canvas.getContext("2d");

var desplazamiento = 0; 

// función para color aleatorio
function colorRandom() {
    return "rgb(" +
        Math.floor(Math.random()*255) + "," +
        Math.floor(Math.random()*255) + "," +
        Math.floor(Math.random()*255) + ")";
}

// dibujar gráfico
function drawGraph() {

    // limpiar
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ejes
    ctx.beginPath();
    ctx.strokeStyle = "black";

    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);

    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);

    ctx.stroke();

    // NUMERACIÓN
    ctx.fillStyle = "black";
    ctx.font = "10px Arial";

    var centroX = canvas.width / 2;
    var centroY = canvas.height / 2;
    var escala = 50;

    // eje X 
    for (let x = -7; x <= 7; x++) {
        if (x !== 0) {
            let posX = centroX + x * escala;
            ctx.fillText(x, posX - 5, centroY + 15);
        }
    }

    // eje Y 
    for (let y = -3; y <= 3; y++) {
        if (y !== 0) {
            let posY = centroY - y * escala;
            ctx.fillText(y, centroX + 5, posY + 3);
        }
    }

    ctx.fillText("0", centroX + 5, centroY + 15);

    // color de curva
    ctx.beginPath();
    ctx.strokeStyle = colorRandom(); // cambio de color
    ctx.lineWidth = 2;

    for (var x = 0; x < canvas.width; x++) {

        var y = Math.cos((x + desplazamiento) * 0.02);
        var canvasY = canvas.height / 2 - y * 100;

        if (x === 0) {
            ctx.moveTo(x, canvasY);
        } else {
            ctx.lineTo(x, canvasY);
        }
    }

    ctx.stroke();
}

//  actualizar cada segundo
setInterval(function() {
    desplazamiento += 20;
    drawGraph();
}, 1000);

// inicial
drawGraph();

</script>

</body>
</html>
